<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NeuroSpark AI</title>


<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}


.container {
    text-align: center;
    width: 400px;
}


h1 {
    color: #00ffc3;
}


.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 20px;
    margin-top: 20px;
    box-shadow: 0 0 20px rgba(0,255,200,0.1);
}


input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
}


button {
    margin-top: 15px;
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(45deg, #00ffc3, #00aaff);
    color: black;
    font-weight: bold;
    cursor: pointer;
}


.low { color: #00ff88; }
.medium { color: #ffcc00; }
.high { color: #ff4d4d; }
</style>
</head>


<body>


<div class="container">


    <h1>NeuroSpark (NSP)</h1>
    <p>AI Risk Analysis Engine</p>


    <div class="card">
        <input id="contract" placeholder="Enter contract address...">
        <button onclick="analyze()">Run AI Scan</button>
    </div>


    <div class="card" id="result" style="display:none;">
        <h3 id="score"></h3>
        <p>Risk Level: <span id="riskLevel"></span></p>


        <p><b>Key Risk Factors:</b></p>
        <ul id="warnings"></ul>


        <p><b>AI Verdict:</b></p>
        <p id="verdict"></p>
    </div>


</div>


<script>
async function analyze() {


    let contract = document.getElementById("contract").value;


    if (!contract) {
        alert("Enter contract address");
        return;
    }


    document.getElementById("result").style.display = "block";
    document.getElementById("score").innerHTML = "Analyzing...";
    document.getElementById("warnings").innerHTML = "";
    document.getElementById("verdict").innerHTML = "";


    try {


        const res = await fetch(`/api/scan?contract=${contract}`);
        const data = await res.json();
        console.log(data);

        if (!data.result || Object.keys(data.result).length === 0) {
            document.getElementById("score").innerHTML = "Token not found";
            return;
        }

const token = data.result?.
[contract.toLowerCase()];

if (!token) {

document.getElementById("score").innerHTML 
= "Token data not found";
  return;
}


        let score = 100;
let warnings = [];


if (token.is_honeypot === "1") {
  score -= 50;
  warnings.push("Honeypot risk");
}


if (token.buy_tax && parseFloat(token.buy_tax) > 10) {
  score -= 20;
  warnings.push("High buy tax");
}


if (token.sell_tax && parseFloat(token.sell_tax) > 10) {
  score -= 20;
  warnings.push("High sell tax");
}


if (token.owner_percent && parseFloat(token.owner_percent) > 10) {
  score -= 20;
  warnings.push("High owner control");
}


if (token.is_in_dex !== "1") {
  score -= 20;
  warnings.push("Low liquidity");
}

document.getElementById("score").innerHTML = score + " / 100";
document.getElementById("warnings").innerHTML = warnings.join(", ") || "No major risks";


document.getElementById("verdict").innerHTML =
  score > 70
    ? "Low risk detected. Suitable for further evaluation."
    : score > 40
    ? "Moderate risk. Be cautious."
    : "High risk. Avoid.";


        // Risk Level
        let riskText = "";
        let riskClass = "";


        if (score > 80) {
            riskText = "Low 🟢";
            riskClass = "low";
        } else if (score > 50) {
            riskText = "Medium ⚠️";
            riskClass = "medium";
        } else {
            riskText = "High 🔴";
            riskClass = "high";
        }


        // UI update
        document.getElementById("score").innerHTML = "AI Risk Score: " + score + " / 100";


        let warningsHTML = "";
        warnings.forEach(w => {
            warningsHTML += "<li>" + w + "</li>";
        });


        document.getElementById("warnings").innerHTML = warningsHTML;
        document.getElementById("riskLevel").innerHTML = riskText;
        document.getElementById("riskLevel").className = riskClass;


        document.getElementById("verdict").innerHTML =
            score > 80
            ? "Low risk detected. Suitable for further evaluation."
            : score > 50
            ? "Moderate risk detected. Proceed with caution."
            : "High risk detected. Avoid interaction.";


    } catch (err) {
        document.getElementById("score").innerHTML = "API error";
    }
}
</script>


</body>
</html>
