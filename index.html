<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroSpark (NSP)</title><style>
body {
  background: #020617;
  font-family: Arial, sans-serif;
  color: #e2e8f0;
  text-align: center;
  padding: 40px;
}


.container {
  max-width: 520px;
  margin: auto;
}


.subtitle { color: #22c55e; }


.demo-note {
  font-size: 13px;
  color: #64748b;
  margin-bottom: 20px;
}


input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 15px;
}


button {
  margin-top: 10px;
  background: #22c55e;
  border: none;
  padding: 12px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  width: 100%;
}


#loading {
  display: none;
  margin-top: 20px;
  color: #22c55e;
}


.loader {
  border: 3px solid #1e293b;
  border-top: 3px solid #22c55e;
  border-radius: 50%;
  width: 20px;
  height: 20px;
  animation: spin 1s linear infinite;
  display: inline-block;
}


@keyframes spin { 100% { transform: rotate(360deg);} }


.result-card {
  display: none;
  margin-top: 25px;
  background: #0f172a;
  padding: 20px;
  border-radius: 16px;
  text-align: left;
}


.score-box {
  display: flex;
  justify-content: space-between;
  align-items: center;
}


.score { font-size: 30px; font-weight: bold; }


.badge { padding: 6px 12px; border-radius: 10px; font-size: 12px; font-weight: bold; }


.low { background: #22c55e; color: black; }
.medium { background: orange; color: black; }
.high { background: red; color: white; }


.bar {
  height: 10px;
  background: #1e293b;
  border-radius: 10px;
  margin: 12px 0;
}


.fill { height: 100%; transition: 0.5s; }


.section { margin-top: 15px; }


.verdict { color: #facc15; font-weight: bold; }


.why { color: #94a3b8; font-size: 14px; }


.cta { margin-top: 15px; color: #22c55e; font-size: 13px; }
</style></head><body><div class="container">
  <h1>NeuroSpark (NSP)</h1>
  <p class="subtitle">AI Risk Analysis Engine</p>
  <p>Don't trade blind. Analyze risk before you invest.</p>
  <p class="demo-note">Demo preview — live AI engine rolling out soon</p>  <input id="contract" placeholder="Enter token contract address...">
  <button onclick="analyze()">Analyze Contract</button>  <div id="loading">
    <span class="loader"></span> Analyzing contract...
  </div>  <div class="result-card" id="result"><div class="score-box">
  <div class="score" id="score">--</div>
  <div class="badge" id="badge">--</div>
</div>


<div class="bar">
  <div class="fill" id="barFill"></div>
</div>


<div class="section">
  <h4>Key Risk Factors</h4>
  <ul id="factors"></ul>
</div>


<div class="section">
  <h4>AI Verdict</h4>
  <p class="verdict" id="verdict"></p>
</div>


<div class="section why">
  <h4>Why It Matters</h4>
  <p id="why"></p>
</div>


<p class="cta">
  Want deeper analysis? NSP holders unlock advanced AI insights.
</p>


  </div>
</div><script>
function analyze() {
  const input = document.getElementById("contract").value;
  if (!input) return alert("Enter contract address");


  document.getElementById("loading").style.display = "block";
  document.getElementById("result").style.display = "none";


  setTimeout(() => {


    document.getElementById("loading").style.display = "none";
    document.getElementById("result").style.display = "block";


    const score = Math.floor(Math.random() * 60) + 30;
    document.getElementById("score").innerText = score + " / 100";


    const badge = document.getElementById("badge");
    const bar = document.getElementById("barFill");


    let owner, liquidity, lockText, verdict, why, color;


    if (score > 70) {
      badge.innerText = "LOW RISK";
      badge.className = "badge low";
      color = "#22c55e";


      owner = Math.floor(Math.random()*15)+5;
      liquidity = Math.floor(Math.random()*300)+200;
      lockText = "Liquidity locked for 12+ months";


      verdict = "Low risk profile. No major red flags detected.";
      why = "Healthy token distribution and strong liquidity reduce manipulation risk.";


    }
    else if (score > 50) {
      badge.innerText = "MEDIUM RISK";
      badge.className = "badge medium";
      color = "orange";


      owner = Math.floor(Math.random()*25)+15;
      liquidity = Math.floor(Math.random()*150)+50;
      lockText = "Partial liquidity lock detected";


      verdict = "Moderate risk detected. Some structural concerns present.";
      why = "Certain patterns resemble early-stage setups before volatility spikes.";


    }
    else {
      badge.innerText = "HIGH RISK";
      badge.className = "badge high";
      color = "red";


      owner = Math.floor(Math.random()*40)+30;
      liquidity = Math.floor(Math.random()*50)+5;
      lockText = "No liquidity lock detected";


      verdict = "Likely insider-controlled token. High probability of liquidity trap.";
      why = "Strong similarities with past rug pull and exit liquidity behavior.";
    }


    bar.style.width = score + "%";
    bar.style.background = color;


    document.getElementById("factors").innerHTML = `
      <li>⚠️ Owner holds ${owner}% of supply</li>
      <li>⚠️ Liquidity approx $${liquidity}K</li>
      <li>⚠️ ${lockText}</li>
    `;


    document.getElementById("verdict").innerText = verdict;
    document.getElementById("why").innerText = why;


  }, 1500);
}
</script></body>
</html>
