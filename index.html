<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NeuroSpark AI</title>


<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}


/* Container */
.container {
    text-align: center;
    width: 400px;
}


/* Title */
h1 {
    color: #00ffc3;
}


/* Card */
.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 20px;
    margin-top: 20px;
    box-shadow: 0 0 20px rgba(0,255,200,0.1);
}


/* Input */
input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
}


/* Button */
button {
    margin-top: 15px;
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(45deg, #00ffc3, #00aaff);
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}


button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #00ffc3;
}


/* Risk colors */
.low { color: #00ff88; }
.medium { color: #ffcc00; }
.high { color: #ff4d4d; }
</style>
</head>


<body>


<div class="container">


    <h1>NeuroSpark (NSP)</h1>
    <p>AI Risk Analysis Engine</p>


    <div class="card">
        <input id="contract" placeholder="Enter contract address...">
        <button onclick="analyze()">Run AI Scan</button>
    </div>


    <div class="card" id="result" style="display:none;">
        <h3 id="score"></h3>
        <p>Risk Level: <span id="riskLevel"></span></p>


        <p><b>Key Risk Factors:</b></p>
        <ul id="warnings"></ul>


        <p><b>AI Verdict:</b></p>
        <p id="verdict"></p>
    </div>


    <div class="card" id="analysis" style="display:none;">
        <h3>AI Deep Analysis</h3>


        <p>✔ Smart Contract Audit Score: 82/100</p>
        <p>✔ Honeypot Risk: Low ✅</p>
        <p>✔ Liquidity Stability: Strong 💧</p>
        <p>✔ Whale Manipulation Risk: Medium ⚠️</p>


        <p><b>Confidence Level: High</b></p>
    </div>


</div>


<script>
function analyze() {


    let score = Math.floor(Math.random() * 100);


    let riskText = document.getElementById("riskLevel");
    let scoreText = document.getElementById("score");
    let warnings = document.getElementById("warnings");
    let verdict = document.getElementById("verdict");


    scoreText.innerHTML = "AI Risk Score: " + score + " / 100";


    warnings.innerHTML = "";


    if (score > 80) {
        riskText.innerHTML = "Low 🟢";
        riskText.className = "low";


        warnings.innerHTML += "<li>Owner wallet holds 4%</li>";
        warnings.innerHTML += "<li>Liquidity locked</li>";


        verdict.innerHTML = "Low risk detected. Suitable for further evaluation.";
    }
    else if (score > 50) {
        riskText.innerHTML = "Medium ⚠️";
        riskText.className = "medium";


        warnings.innerHTML += "<li>Owner wallet holds 18%</li>";
        warnings.innerHTML += "<li>Liquidity partially locked</li>";


        verdict.innerHTML = "Moderate risk detected. Proceed with caution.";
    }
    else {
        riskText.innerHTML = "High 🔴";
        riskText.className = "high";


        warnings.innerHTML += "<li>High whale concentration</li>";
        warnings.innerHTML += "<li>Liquidity not locked</li>";


        verdict.innerHTML = "High risk detected. Not recommended.";
    }


    document.getElementById("result").style.display = "block";
    document.getElementById("analysis").style.display = "block";
}
</script>


</body>
</html>
