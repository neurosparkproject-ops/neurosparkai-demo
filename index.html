<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NeuroSpark AI</title>


<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}


.container {
    text-align: center;
    width: 400px;
}


h1 {
    color: #00ffc3;
}


.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 20px;
    margin-top: 20px;
    box-shadow: 0 0 20px rgba(0,255,200,0.1);
}


input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
}


button {
    margin-top: 15px;
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(45deg, #00ffc3, #00aaff);
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}


button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #00ffc3;
}


.low { color: #00ff88; }
.medium { color: #ffcc00; }
.high { color: #ff4d4d; }
</style>
</head>


<body>


<div class="container">


    <h1>NeuroSpark (NSP)</h1>
    <p>AI Risk Analysis Engine</p>


    <div class="card">
        <input id="contract" placeholder="Enter contract address...">
        <button onclick="analyze()">Run AI Scan</button>
    </div>


    <div class="card" id="result" style="display:none;">
        <h3 id="score"></h3>
        <p>Risk Level: <span id="riskLevel"></span></p>


        <p><b>Key Risk Factors:</b></p>
        <ul id="warnings"></ul>


        <p><b>AI Verdict:</b></p>
        <p id="verdict"></p>
    </div>


</div>


<script>
async function analyze() {


    const contract = document.getElementById("contract").value;


    if (!contract) {
        alert("Enter contract address");
        return;
    }


    // UI reset
    document.getElementById("result").style.display = "block";
    document.getElementById("analysis").style.display = "block";


    document.getElementById("score").innerHTML = "Scanning blockchain...";
    document.getElementById("warnings").innerHTML = "";
    document.getElementById("verdict").innerHTML = "";
    document.getElementById("riskLevel").innerHTML = "...";


    // AI hissi için delay
    await new Promise(r => setTimeout(r, 1200));


    try {
        const res = await fetch(`https://api.gopluslabs.io/api/v1/token_security/1?contract_addresses=${contract}`);
        const data = await res.json();


        if (!data.result || Object.keys(data.result).length === 0) {
            document.getElementById("score").innerHTML = "Token data not available";
            return;
        }


        const token = data.result[Object.keys(data.result)[0]];


        let score = 100;
let warningsList = [];


// Honeypot
if (token.is_honeypot === "1") {
    score -= 50;
    warningsList.push("Honeypot risk detected");
} else if (!token.is_honeypot) {
    score -= 10;
    warningsList.push("Honeypot data unavailable");
}


// Owner
if (token.owner_percentage && parseFloat(token.owner_percentage) > 10) {
    score -= 20;
    warningsList.push("High owner control");
} else if (!token.owner_percentage) {
    score -= 10;
    warningsList.push("Owner data unavailable");
}


// Liquidity
if (token.is_in_dex === "0") {
    score -= 20;
    warningsList.push("Low liquidity");
} else if (!token.is_in_dex) {
    score -= 10;
    warningsList.push("Liquidity data unavailable");
}


// limit
if (score < 0) score = 0;


        // 🔥 SKOR ANİMASYONU
        let current = 0;
        const interval = setInterval(() => {
            current += 2;
            document.getElementById("score").innerHTML = "AI Risk Score: " + current + " / 100";


            if (current >= score) {
                clearInterval(interval);


                // Risk level
                let riskText = "";
                let riskClass = "";


                if (score > 80) {
                    riskText = "Low 🟢";
                    riskClass = "low";
                } else if (score > 50) {
                    riskText = "Medium ⚠️";
                    riskClass = "medium";
                } else {
                    riskText = "High 🔴";
                    riskClass = "high";
                }


                const riskEl = document.getElementById("riskLevel");
                riskEl.innerHTML = riskText;
                riskEl.className = riskClass;


                // Warnings
                let warningsHTML = "";
                warningsList.forEach(w => {
                    warningsHTML += "<li>" + w + "</li>";
                });


                document.getElementById("warnings").innerHTML = warningsHTML || "<li>No major risks detected</li>";


                // Verdict
                document.getElementById("verdict").innerHTML =
                    score > 80
                        ? "AI analysis indicates low contract risk. No critical vulnerabilities detected."
                        : score > 50
                        ? "Moderate risk detected. Some caution is advised."
                        : "High risk detected. Avoid interaction.";


                // Confidence
                document.getElementById("analysis").innerHTML += `
                    <p><b>Confidence Level:</b> High</p>
                `;
            }
        }, 20);


    } catch (err) {
        document.getElementById("score").innerHTML = "Error fetching data";
    }
}
</script>


</body>
</html>
